# RBMS Nginx Configuration Template
# Place this in /etc/nginx/sites-available/rbms and link to sites-enabled

server {
    listen 80;
    server_name yourdomain.com; # Replace with your actual domain or IP

    # 1. Public Website Frontend
    location / {
        root /var/www/rbms/frontend/public/dist; # Path to public build folder
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Admin Dashboard (Sub-path /manage)
    location /manage/ {
        alias /var/www/rbms/frontend/admin/dist/; # Path to admin build folder (must end with /)
        index index.html;
        try_files $uri $uri/ /manage/index.html;
    }

    # 3. Django Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Django Admin Interface
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Static Files (Django Admin CSS / JS / Media)
    location /static/ {
        alias /var/www/rbms/backend/staticfiles/; # Run python manage.py collectstatic first
    }

    location /media/ {
        alias /var/www/rbms/backend/media/; # For uploaded files
    }
}
